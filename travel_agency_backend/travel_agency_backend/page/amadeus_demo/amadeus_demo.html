<div class="amadeus-api-demo">
    <div class="panel panel-default">
        <div class="panel-body">
            <h3>Flight Search</h3>
            <div class="row">
                <div class="col-sm-3">
                    <input type="text" class="form-control" id="flight-origin" placeholder="Origin (e.g. LHR)" value="LHR">
                </div>
                <div class="col-sm-3">
                    <input type="text" class="form-control" id="flight-destination" placeholder="Destination (e.g. CDG)" value="CDG">
                </div>
                <div class="col-sm-3">
                    <input type="date" class="form-control" id="flight-date">
                </div>
                <div class="col-sm-3">
                    <button class="btn btn-primary btn-block" id="btn-search-flights">Search Flights</button>
                </div>
            </div>
        </div>
    </div>

    <div class="panel panel-default">
        <div class="panel-body">
            <h3>Airport Search</h3>
            <div class="row">
                <div class="col-sm-9">
                    <input type="text" class="form-control" id="airport-query" placeholder="City or Airport (e.g. London)" value="London">
                </div>
                <div class="col-sm-3">
                    <button class="btn btn-primary btn-block" id="btn-search-airports">Search Airports</button>
                </div>
            </div>
        </div>
    </div>

    <div class="panel panel-default">
        <div class="panel-body">
            <h3>Hotel Search</h3>
            <div class="row">
                <div class="col-sm-3">
                    <input type="text" class="form-control" id="hotel-city" placeholder="City Code (e.g. PAR)" value="PAR">
                </div>
                <div class="col-sm-3">
                    <input type="date" class="form-control" id="hotel-checkin" placeholder="Check-in">
                </div>
                <div class="col-sm-3">
                    <input type="date" class="form-control" id="hotel-checkout" placeholder="Check-out">
                </div>
                <div class="col-sm-3">
                    <button class="btn btn-primary btn-block" id="btn-search-hotels">Search Hotels</button>
                </div>
            </div>
        </div>
    </div>

    <div id="api-results" class="well" style="display:none;"></div>
</div>
